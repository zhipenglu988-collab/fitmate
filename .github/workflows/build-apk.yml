name: Build FitMate APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer SDK/NDK
        uses: actions/cache@v4
        with:
          path: /home/user/.buildozer
          key: buildozer-docker-v1

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fitmate-apk
          path: ./bin/*.apk
          if-no-files-found: error

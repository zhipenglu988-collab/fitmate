name: Build FitMate APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Cache Buildozer SDK/NDK
        uses: actions/cache@v4
        id: cache-buildozer
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v3

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fitmate-apk
          path: bin/*.apk
          if-no-files-found: error
